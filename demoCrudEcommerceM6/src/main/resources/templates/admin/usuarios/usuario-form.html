<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body class="bg-light">
<div th:replace="~{public/layout/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="mb-4">
                <a th:href="@{/usuarios/admin/gestion}" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm border-0 bg-white titulo-magico">
                    <i class="bi bi-arrow-left-short me-1"></i> Volver a Lista de Usuarios
                </a>
            </div>

            <div class="text-center mb-4">
                <h2 class="fw-bold titulo-magico" th:text="${nuevoUsuario.id == null ? 'Manifestar Nuevo Habitante' : 'Actualizar Esencia del Habitante'}">Manifestar Nuevo Habitante</h2>
                <p class="text-muted">Gestión de identidad y ubicación dentro de la Alianza.</p>
            </div>

            <div class="card shadow-lg border-0 card-magica-form" style="border-radius: 30px;">
                <div class="card-body p-3 p-sm-4 p-md-6">

                    <form th:action="@{/usuarios/admin/guardar}" th:object="${nuevoUsuario}" method="post" id="formUsuario" novalidate>

                        <!-- Error del Service (MagicalBusinessException): siempre al tope, es un error de negocio general -->
                        <div th:if="${error != null}" class="alert alert-danger bg-white border-0 shadow-sm mb-4 small"
                             role="alert" style="color: #dc3545; border-left: 4px solid #dc3545 !important;">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${error}"></span>
                        </div>

                        <input type="hidden" th:field="*{id}">

                        <div class="row g-4">

                            <!-- ── SECCIÓN IDENTIDAD ── -->
                            <div class="col-12 border-bottom pb-2 mb-2">
                                <h5 class="titulo-magico small text-uppercase fw-bold"><i class="bi bi-person-badge me-2"></i>Datos de Identidad</h5>
                            </div>

                            <!-- Nombre -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{nombre}"
                                           th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="nom" placeholder="Nombre">
                                    <label for="nom">Nombre</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-nombre">
                                    <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                                </div>
                            </div>

                            <!-- Apellido -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{apellido}"
                                           th:classappend="${#fields.hasErrors('apellido')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="ape" placeholder="Apellido">
                                    <label for="ape">Apellido</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-apellido">
                                    <span th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
                                </div>
                            </div>

                            <!-- RUT -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{rut}"
                                           th:classappend="${#fields.hasErrors('rut')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="rutAdmin" placeholder="12.345.678-k">
                                    <label for="rutAdmin">RUT / Identificación</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-rut">
                                    <span th:if="${#fields.hasErrors('rut')}" th:errors="*{rut}"></span>
                                </div>
                            </div>

                            <!-- Fecha de Nacimiento -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" th:field="*{fechaNacimiento}"
                                           th:classappend="${#fields.hasErrors('fechaNacimiento')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="fecNacAdmin">
                                    <label for="fecNacAdmin">Fecha de Nacimiento</label>
                                </div>
                                <!-- Sirve tanto para info de edad (verde) como para error de edad (rojo) -->
                                <div class="small mt-1 px-1" id="msgEdadAdmin">
                                    <span th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}" class="text-danger fst-italic"></span>
                                </div>
                            </div>

                            <!-- Teléfono (opcional) -->
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="tel" th:field="*{telefono}" class="form-control input-magico" id="telAdmin" placeholder="+569...">
                                    <label for="telAdmin">Teléfono de Contacto (opcional)</label>
                                </div>
                            </div>

                            <!-- ── SECCIÓN DIRECCIÓN ── -->
                            <div class="col-12 border-bottom pb-2 mt-4 mb-2">
                                <h5 class="titulo-magico small text-uppercase fw-bold"><i class="bi bi-geo-alt me-2"></i>Ubicación y Domicilio</h5>
                            </div>

                            <!-- Dirección -->
                            <div class="col-md-12">
                                <div class="form-floating">
                                    <input type="text" th:field="*{direccion}"
                                           th:classappend="${#fields.hasErrors('direccion')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="dirAdmin" placeholder="Calle, número, depto">
                                    <label>Dirección (Calle y Número)</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-direccion">
                                    <span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></span>
                                </div>
                            </div>

                            <!-- Ciudad -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{ciudad}"
                                           th:classappend="${#fields.hasErrors('ciudad')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="ciudadAdmin" placeholder="Ciudad">
                                    <label>Ciudad</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-ciudad">
                                    <span th:if="${#fields.hasErrors('ciudad')}" th:errors="*{ciudad}"></span>
                                </div>
                            </div>

                            <!-- Región -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{estadoRegion}"
                                           th:classappend="${#fields.hasErrors('estadoRegion')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="regionAdmin" placeholder="Región">
                                    <label>Región / Estado</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-estadoRegion">
                                    <span th:if="${#fields.hasErrors('estadoRegion')}" th:errors="*{estadoRegion}"></span>
                                </div>
                            </div>

                            <!-- País -->
                            <div class="col-md-5">
                                <div class="form-floating">
                                    <input type="text" th:field="*{pais}"
                                           th:classappend="${#fields.hasErrors('pais')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="paisAdmin" placeholder="País">
                                    <label>País</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-pais">
                                    <span th:if="${#fields.hasErrors('pais')}" th:errors="*{pais}"></span>
                                </div>
                            </div>

                            <!-- Código Postal -->
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input type="text" th:field="*{codigoPostal}" class="form-control input-magico" placeholder="CP">
                                    <label>Código Postal (opcional)</label>
                                </div>
                            </div>

                            <!-- Es Principal -->
                            <div class="col-md-3 d-flex align-items-center">
                                <div class="form-check form-switch ms-2">
                                    <input class="form-check-input" type="checkbox" th:field="*{esPrincipal}" id="checkPrincipal">
                                    <label class="form-check-label small" for="checkPrincipal">¿Es Principal?</label>
                                </div>
                            </div>

                            <!-- ── SECCIÓN SEGURIDAD ── -->
                            <div class="col-12 border-bottom pb-2 mt-4 mb-2">
                                <h5 class="titulo-magico small text-uppercase fw-bold"><i class="bi bi-shield-shaded me-2"></i>Seguridad y Acceso</h5>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"
                                           class="form-control input-magico" id="em" placeholder="correo@alianza.com">
                                    <label for="em">Correo Electrónico</label>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-email">
                                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="col-md-6">
                                <div class="input-group">
                                    <div class="form-floating flex-grow-3">
                                        <input type="password"
                                               name="password"
                                               class="form-control input-magico border-end-0"
                                               id="pwAdmin"
                                               placeholder="Contraseña">
                                        <label for="pwAdmin"
                                               th:text="${nuevoUsuario.id == null ? 'Contraseña' : 'Nueva contraseña'}">
                                        </label>
                                    </div>
                                    <button class="btn btn-outline-secondary border-start-0 bg-white" type="button" id="btnTogglePw" style="border-radius: 0 15px 15px 0;">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="text-danger small mt-1 fst-italic" id="err-password"></div>
                                <small class="text-muted" th:if="${nuevoUsuario.id != null}" style="font-size: 0.7rem;">
                                    * Deja en blanco para mantener la contraseña actual.
                                </small>
                            </div>

                            <!-- Rol -->
                            <div class="col-12">
                                <label class="label-magico small text-uppercase fw-bold mb-2 d-block">Rango de Usuario</label>
                                <select name="idRol" id="selectRol" class="form-select input-magico py-3" style="border-radius: 15px;">
                                    <option value="" disabled th:selected="${idRolActual == null}">Selecciona un rango...</option>
                                    <option th:each="rol : ${roles}"
                                            th:value="${rol.id}"
                                            th:text="${rol.nombre == 'ROLE_ADMIN' ? '🌙 Administrador' : '🌸 Guardián(a)'}"
                                            th:selected="${idRolActual == rol.id}">
                                    </option>
                                </select>
                                <div class="text-danger small mt-1 fst-italic" id="err-rol"></div>
                            </div>

                        </div>

                        <div class="row mt-5">
                            <div class="col-6">
                                <a th:href="@{/usuarios/admin/gestion}" class="btn btn-outline-secondary w-100 py-3 rounded-pill">Cancelar</a>
                            </div>
                            <div class="col-6">
                                <button type="submit" class="btn btn-guardar-magico w-100 py-3 rounded-pill shadow fw-bold text-uppercase">
                                    <i class="bi bi-stars me-1"></i>
                                    <span th:text="${nuevoUsuario.id == null ? 'Invocación' : 'Actualización'}">Guardar</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>



<div th:replace="~{public/layout/footer :: footer}"></div>

<script th:inline="javascript">
    const esNuevo = /*[[${nuevoUsuario.id == null}]]*/ true;

    // ── RUT: formateo en tiempo real ──
    const rutInput = document.getElementById('rutAdmin');
    rutInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/[^0-9kK]/g, '');
        if (v.length > 1) {
            let c = v.slice(0, -1);
            let d = v.slice(-1).toUpperCase();
            e.target.value = c.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + d;
        }
    });

    // ── EDAD: cálculo y mensaje ──
    const fecNac   = document.getElementById('fecNacAdmin');
    const msgEdad  = document.getElementById('msgEdadAdmin');

    function calcularEdad(fechaStr) {
        const hoy   = new Date();
        const cumple = new Date(fechaStr);
        let edad = hoy.getFullYear() - cumple.getFullYear();
        if (hoy.getMonth() < cumple.getMonth() ||
           (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
        return edad;
    }

    function mostrarEdad(fechaStr) {
        if (!fechaStr) { msgEdad.innerHTML = ''; return; }
        const edad = calcularEdad(fechaStr);
        if (edad < 18) {
            msgEdad.innerHTML = `<span class="text-danger">❌ Menor de edad (${edad} años). Mínimo 18.</span>`;
        } else if (edad > 105) {
            msgEdad.innerHTML = `<span class="text-danger">❌ Edad no válida (${edad} años). Máximo 105.</span>`;
        } else {
            msgEdad.innerHTML = `<span class="text-success">✅ Edad válida: ${edad} años</span>`;
        }
    }

    fecNac.addEventListener('change', function() { mostrarEdad(this.value); });

    // Al cargar la página en modo edición, mostrar la edad si ya tiene fecha
    if (fecNac.value) mostrarEdad(fecNac.value);

    // ── PASSWORD TOGGLE ──
    document.getElementById('btnTogglePw').addEventListener('click', function() {
        const p = document.getElementById('pwAdmin');
        const i = this.querySelector('i');
        p.type = p.type === 'password' ? 'text' : 'password';
        i.classList.toggle('bi-eye');
        i.classList.toggle('bi-eye-slash');
    });

    // ── VALIDACIÓN INLINE AL ENVIAR ──
    function setError(inputEl, errDivId, msg) {
        if (inputEl) inputEl.classList.add('is-invalid');
        const errDiv = document.getElementById(errDivId);
        if (errDiv) errDiv.textContent = msg;
    }

    function clearError(inputEl, errDivId) {
        if (inputEl) inputEl.classList.remove('is-invalid');
        const errDiv = document.getElementById(errDivId);
        if (errDiv) errDiv.textContent = '';
    }

    document.getElementById('formUsuario').addEventListener('submit', function(e) {
        let hayError = false;

        // Lista de campos de texto obligatorios: [inputId, errDivId, mensaje]
        const camposRequeridos = [
            ['nom',        'err-nombre',      'El nombre es obligatorio.'],
            ['ape',        'err-apellido',     'El apellido es obligatorio.'],
            ['rutAdmin',   'err-rut',          'El RUT es obligatorio.'],
            ['em',         'err-email',        'El email es obligatorio.'],
            ['dirAdmin',   'err-direccion',    'La dirección es obligatoria.'],
            ['ciudadAdmin','err-ciudad',       'La ciudad es obligatoria.'],
            ['regionAdmin','err-estadoRegion', 'La región es obligatoria.'],
            ['paisAdmin',  'err-pais',         'El país es obligatorio.'],
        ];

        camposRequeridos.forEach(([inputId, errId, msg]) => {
            const input = document.getElementById(inputId);
            if (!input.value.trim()) {
                setError(input, errId, msg);
                hayError = true;
            } else {
                clearError(input, errId);
            }
        });

        // Validar formato email
        const emailInput = document.getElementById('em');
        if (emailInput.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
            setError(emailInput, 'err-email', 'El formato del email no es válido.');
            hayError = true;
        }

        // Validar fecha de nacimiento + rango de edad
        if (!fecNac.value) {
            fecNac.classList.add('is-invalid');
            msgEdad.innerHTML = '<span class="text-danger">La fecha de nacimiento es obligatoria.</span>';
            hayError = true;
        } else {
            fecNac.classList.remove('is-invalid');
            const edad = calcularEdad(fecNac.value);
            if (edad < 18) {
                fecNac.classList.add('is-invalid');
                msgEdad.innerHTML = `<span class="text-danger">❌ Menor de edad (${edad} años). Mínimo 18.</span>`;
                hayError = true;
            } else if (edad > 105) {
                fecNac.classList.add('is-invalid');
                msgEdad.innerHTML = `<span class="text-danger">❌ Edad no válida (${edad} años). Máximo 105.</span>`;
                hayError = true;
            } else {
                msgEdad.innerHTML = `<span class="text-success">✅ Edad válida: ${edad} años</span>`;
            }
        }

        // Validar contraseña: obligatoria solo al CREAR
        const pwInput = document.getElementById('pwAdmin');
        if (esNuevo && !pwInput.value.trim()) {
            setError(pwInput, 'err-password', 'La contraseña es obligatoria al crear un usuario.');
            hayError = true;
        } else {
            clearError(pwInput, 'err-password');
        }

        // Validar rol seleccionado
        const rolSelect = document.getElementById('selectRol');
        if (!rolSelect.value) {
            setError(rolSelect, 'err-rol', 'Debes asignar un rango al usuario.');
            hayError = true;
        } else {
            clearError(rolSelect, 'err-rol');
        }

        if (hayError) {
            e.preventDefault();
            // Hacer scroll al primer campo con error
            const primerError = document.querySelector('.is-invalid');
            if (primerError) primerError.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        // Limpiar RUT antes de enviar
        rutInput.value = rutInput.value.replace(/[.\-]/g, '');
    });
    }
</script>
</body>

</html>
