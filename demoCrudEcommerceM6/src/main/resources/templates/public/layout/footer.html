<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footer">

    <div id="btnSubir" class="btn-subir-fijo d-flex align-items-center justify-content-center">
        <a class="desplazarArriba" href="#titulo">
            <img th:src="@{/assets/img/baculo4.png}" alt="Subir" width="80" height="80" class="img-fluid">
        </a>
    </div>

    <div class="footer-magico bg-dark-magic border-top border-3 mt-5">
        <div class="container-fluid row row-cols-1 row-cols-md-3 flex-row d-flex justify-content-center align-items-center text-white mt-1 min-vh-50">

            <div class="flex-column d-flex align-items-center align-items-lg-start ps-3 pt-2 mx-auto col-12 col-md-4">
                <p class="fw-bolder text-rosa-magic">Siguenos en nuestras páginas</p>
                <a href="#" class="text-decoration-none text-white mb-2 link-social-footer">
                    <img th:src="@{/assets/img/face.png}" alt="Facebook" width="40" height="40" class="me-2">
                    <span class="fw-bold">Magical_Alliance</span>
                </a>
                <a href="#" class="text-decoration-none text-white mb-2 link-social-footer">
                    <img th:src="@{/assets/img/insta.png}" alt="Instagram" width="40" height="40" class="me-2">
                    <span class="fw-bold">MagicAlliance</span>
                </a>
                <a href="#" class="text-decoration-none text-white mb-2 link-social-footer">
                    <img th:src="@{/assets/img/pinterest.png}" alt="Pinterest" width="40" height="40" class="me-2">
                    <span class="fw-bold">MagicAlliance</span>
                </a>
                <a href="#" class="text-decoration-none text-white mb-2 link-social-footer">
                    <img th:src="@{/assets/img/wsp.png}" alt="WhatsApp" width="40" height="40" class="me-2">
                    <span class="fw-bold">Magical Alliance</span>
                </a>
            </div>

            <div class="flex-column d-flex mx-auto col-12 col-md-4 text-center">
                <img th:src="@{/assets/img/logo.png}" alt="Magical Alliance" class="rounded img-fluid logo-footer-glow" style="max-width: 250px;">
            </div>

            <div class="mx-auto pe-3 flex-column d-flex col-12 col-md-4">
                <form id="formSuscripcion" novalidate>
                    <label for="emailSubscripcion" class="form-label fw-bolder text-white">Entérate de nuestras promociones</label>
                    <div class="input-group">
                        <input type="email" name="email" class="form-control bg-transparent text-white border-magico" id="emailSubscripcion" placeholder="tu@email.com" required>
                        <button type="submit" class="btn btn-unirse-magic fw-bolder" id="btnSuscribir">Unirse</button>
                    </div>
                    <div class="invalid-feedback d-block text-warning small" id="feedbackEmail" style="display:none !important;"></div>
                </form>
            </div>
        </div>

        <!-- Modal confirmación suscripción -->
        <div class="modal fade" id="modalSuscripcion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; background-color: #1a1a2e;">
                    <div class="modal-body text-center p-4">
                        <i id="modalSuscripcionIcono" class="bi bi-envelope-check display-3" style="color: #f480ff;"></i>
                        <h5 class="fw-bold mt-3" style="color: #f480ff;">¡Bienvenida/o a la Alianza!</h5>
                        <p class="text-white-50 small mt-2" id="modalSuscripcionMensaje"></p>
                        <button type="button" class="btn btn-magico-login btn-sm px-4 mt-2"
                                data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container-fluid d-flex justify-content-center align-content-center mt-3 border-top border-secondary pt-2">
            <h6 class="text-center fst-italic fw-bolder text-white-50">&copy; 2026 Magical Alliance - Todos los derechos reservados.</h6>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:inline="javascript">
        window.projectPath = /*[[@{/}]]*/ '';


        function formatearRut(input) {
            let valor = input.value.replace(/[^0-9kK]/g, '');
            if (valor.length > 1) {
                let cuerpo = valor.slice(0, -1);
                let dv = valor.slice(-1).toUpperCase();
                cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                input.value = cuerpo + '-' + dv;
            } else {
                input.value = valor.toUpperCase();
            }
        }

            function calcularEdad(fechaInput, badgeId) {
                const fecha = new Date(fechaInput.value);
                const hoy = new Date();
                let edad = hoy.getFullYear() - fecha.getFullYear();

            if (hoy.getMonth() < fecha.getMonth() ||
                (hoy.getMonth() === fecha.getMonth() && hoy.getDate() < fecha.getDate())) {
                edad--;
            }

            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.style.display = 'inline-block';
                badge.textContent = edad + ' años';

            if (edad < 18 || edad > 105) {
                fechaInput.setCustomValidity('Edad inválida');
                badge.style.backgroundColor = '#ff6b6b';
            } else {
                fechaInput.setCustomValidity('');
                badge.style.backgroundColor = '#00d4aa';
            }
            }
        }

            // Aplicar a TODOS los inputs fechaNacimiento
            document.querySelectorAll('input[type="date"][id*="fecha"], input[name*="fechaNacimiento"]').forEach(input => {
                input.addEventListener('change', function() {
                    calcularEdad(this, this.dataset.edadBadge || 'verEdad');
                });
            });

            // Aplicar a TODOS los inputs RUT
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('input[type="text"][id*="rut"], input[name*="rut"]').forEach(input => {
                    input.addEventListener('input', () => formatearRut(input));
                });
            });
       window.addEventListener('scroll', () => {
    const btnSubir = document.getElementById("btnSubir");
    if (btnSubir) {
        // Si bajamos más de 200px, añadimos la clase de visibilidad
        if (window.scrollY > 200) {
            btnSubir.classList.add("btn-subir-visible");
        } else {
            btnSubir.classList.remove("btn-subir-visible");
        }
    }
});
    </script>
    <script th:src="@{/assets/js/ecommerce.js}"></script>

    <script th:inline="javascript">
        (function () {
            const form = document.getElementById('formSuscripcion');
            if (!form) return;

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const emailInput = document.getElementById('emailSubscripcion');
                const feedback   = document.getElementById('feedbackEmail');
                const btn        = document.getElementById('btnSuscribir');
                const email      = emailInput.value.trim();

                // Validación básica en cliente
                if (!email || !emailInput.checkValidity()) {
                    feedback.textContent = 'Por favor ingresa un correo válido.';
                    feedback.style.setProperty('display', 'block', 'important');
                    emailInput.classList.add('is-invalid');
                    return;
                }

                feedback.style.setProperty('display', 'none', 'important');
                emailInput.classList.remove('is-invalid');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Enviando...';

                const formData = new FormData();
                formData.append('email', email);

                fetch(/*[[@{/subscribir}]]*/ '/subscribir', {
                    method: 'POST',
                    body: formData
                })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    const icono   = document.getElementById('modalSuscripcionIcono');
                    const mensaje = document.getElementById('modalSuscripcionMensaje');

                    if (data.estado === 'error') {
                        icono.className = 'bi bi-exclamation-octagon display-3';
                        icono.style.color = '#ff4da6';
                    } else {
                        icono.className = 'bi bi-envelope-check display-3';
                        icono.style.color = '#f480ff';
                        emailInput.value = '';
                    }

                    mensaje.innerHTML = data.mensaje;
                    var modal = new bootstrap.Modal(document.getElementById('modalSuscripcion'));
                    modal.show();
                })
                .catch(function () {
                    const mensaje = document.getElementById('modalSuscripcionMensaje');
                    const icono   = document.getElementById('modalSuscripcionIcono');
                    icono.className = 'bi bi-exclamation-octagon display-3';
                    icono.style.color = '#ff4da6';
                    mensaje.textContent = 'Ocurrió un error al procesar tu solicitud. Intenta de nuevo.';
                    var modal = new bootstrap.Modal(document.getElementById('modalSuscripcion'));
                    modal.show();
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.innerHTML = 'Unirse';
                });
            });
        })();
    </script>
</footer>
</html>
